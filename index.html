<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Ball</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="profile-card">
        <div class="header"></div>
        <div class="content">
            <div class="profile-img">
                <img src="https://via.placeholder.com/150" alt="Profile Picture">
            </div>
            <h1>บอล (Ball)</h1>
            <p class="job-title">Web Developer & Designer</p>
            
            <div class="bio">
                <p>สวัสดีครับ! ผมเป็นคนที่หลงใหลในการเขียนโค้ดและการสร้างสรรค์เว็บไซต์ที่มีประสบการณ์ผู้ใช้งานที่ดี (UX/UI) ยินดีที่ได้รู้จักทุกคนครับ</p>
            </div>

            <div class="skills">
                <span class="tag">HTML5</span>
                <span class="tag">CSS3</span>
                <span class="tag">JavaScript</span>
                <span class="tag">React</span>
            </div>

            <hr>

            <div class="links">
                <a href="#" class="btn facebook">Facebook</a>
                <a href="#" class="btn github">GitHub</a>
                <a href="mailto:example@email.com" class="btn email">Contact Me</a>
            </div>
        </div>
    </div>

</body>
</html>
